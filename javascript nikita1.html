<!DOCTYPE html>
<html>
<head>
    <title>Student Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #e0f7fa;
        }

        .glass {
            background: rgba(0, 128, 128, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            width: 85%;
            margin: 40px auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,255,0.2);
        }

        input {
            padding: 12px;
            margin: 8px;
            border-radius: 10px;
            border: none;
            outline: none;
            width: 200px;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: #b2ebf2;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #008080, #20c997);
            color: white;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: rgba(0, 128, 128, 0.5);
        }

        #dashboard {
            display: none;
        }

        .title {
            font-size: 30px;
            margin-bottom: 15px;
            color: #00e5ff;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="glass">
    <div class="title">🔐 Login</div>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="glass">
    <div class="title">📊 Student Dashboard</div>

    <input type="text" id="name" placeholder="👤 Name">
    <input type="number" id="age" placeholder="🎂 Age">
    <input type="number" id="marks" placeholder="📈 Marks">
    <button onclick="addStudent()">➕ Add</button>

    <table>
        <thead>
            <tr>
                <th>👤 Name</th>
                <th>🎂 Age</th>
                <th>📈 Marks</th>
                <th>❌ Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
let students = [];

function login() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (u === "admin" && p === "1234") {
        document.getElementById("login").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
    } else {
        alert("Wrong username/password");
    }
}

function addStudent() {
    let name = document.getElementById("name").value;
    let age = document.getElementById("age").value;
    let marks = document.getElementById("marks").value;

    if (name === "" || age === "" || marks === "") {
        alert("Fill all fields");
        return;
    }

    students.push({ name, age, marks });
    renderTable();

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("marks").value = "";
}

function renderTable() {
    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    students.forEach((s, index) => {
        table.innerHTML += `
        <tr>
            <td>${s.name}</td>
            <td>${s.age}</td>
            <td>${s.marks}</td>
            <td><button onclick="deleteStudent(${index})">Delete</button></td>
        </tr>`;
    });
}

function deleteStudent(index) {
    students.splice(index, 1);
    renderTable();
}
</script>

</body>
</html>
